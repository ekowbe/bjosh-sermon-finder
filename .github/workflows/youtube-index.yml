name: Index new YouTube sermons

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday 06:00 UTC
  workflow_dispatch: {}

jobs:
  index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: bjosh-finder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Install dependencies
        run: npm ci

      - name: Run YouTube indexer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run index:youtube

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/sermons.js lib/youtube-transcripts.json scripts/youtube-progress.json
          git diff --staged --quiet || git commit -m "chore: weekly YouTube sermon index update"
          git push
